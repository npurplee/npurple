<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürün Detayı | Npurple</title>
    <style>
        body { background-color: #FBE4D8; font-family: 'Sergio', serif; color: #2B124C; padding: 40px; }
        .detail-container { max-width: 900px; margin: 0 auto; display: flex; gap: 40px; flex-wrap: wrap; }
        
        /* Galeri düzenlemesi */
        .product-image { flex: 1; min-width: 300px; }
        .slider-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            border-radius: 10px;
            border: 2px solid #8E7AB5;
            -webkit-overflow-scrolling: touch;
        }
        .slider-container img {
            width: 100%;
            flex-shrink: 0;
            scroll-snap-align: start;
            object-fit: cover;
        }
        /* Galeri düzenlemesi sonu */

        .product-info { flex: 1; min-width: 300px; }
        .stock-tag { background: #8E7AB5; color: white; padding: 5px 10px; border-radius: 4px; display: inline-block; margin-bottom: 15px; }
        .price { font-size: 1.8rem; font-weight: bold; margin: 20px 0; }
        .btn-whatsapp { 
            display: inline-block; padding: 15px 30px; background-color: #25D366; 
            color: white; text-decoration: none; border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="detail-container">
    <div class="product-image">
        <div class="slider-container">
            <img src= "https://resmim.net/cdn/2026/07/16/EMIAiT.png"alt="Ürün Fotoğrafı 1">
            <img src= "https://resmim.net/cdn/2026/07/16/EMIhd1.png" alt="Ürün Fotoğrafı 2">
            <img src= "https://resmim.net/cdn/2026/07/16/EMIIGL.png" alt="Ürün Fotoğrafı 3">
        </div>
        <p style="font-size: 0.8rem; color: #8E7AB5; text-align: center; margin-top: 10px;">Görselleri kaydırabilirsiniz ↔</p>
    </div> 

    <div class="product-info">
        <h1>KIRMIZI GÜLLER BATTANİYE/ŞAL</h1>
        <span class="stock-tag">Stokta Yok (Yenilenecek)</span>
        <p style="line-height: 1.8;">
            🚚 Kargo alıcıya aittir.   
        </p>📧 Sipariş detayları için (renk, boyut vb.) lütfen iletişime geçiniz. 
        <div class="price">4000 TL</div>

        <a href="https://wa.me/05453932794?text=Merhaba, Kırmızı Güller Battaniye/Şal hakkında bilgi almak istiyorum." 
           class="btn-whatsapp" target="_blank">
            WhatsApp ile Sipariş Ver
        </a>
    </div>
</div>

</body>
</html>
