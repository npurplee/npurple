<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPURPLE</title>
    <style>
        :root {
            --bg-krem: #FBE4D8;
            --koyu-mor: #190019;
            --patlican: #2B124C;
            --leylak: #854F6C;
            --hafif-mor: #522B5B;
        }

        body {
            background-color: var(--bg-krem);
            color: var(--patlican);
            margin: 0;
            padding: 40px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--koyu-mor);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 800px;
            margin: 0 auto;
        }

        .product-item {
            text-align: center;
            cursor: pointer;
            padding: 15px;
            border-radius: 15px;
            transition: 0.3s;
        }

        .product-item:hover { background-color: rgba(255,255,255,0.3); }

        .product-image-container img {
            width: 100%;
            max-width: 250px;
            border-radius: 10px;
        }

        /* Detay Paneli Stili */
        #details-overlay {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
            z-index: 100;
        }

        .close-btn {
            background: var(--leylak);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <header class="header-section">
        <img src="https://resmim.net/cdn/2026/07/15/C2OS4n.png" alt="Logo" style="width: 150px;">
        <h1>NPURPLE</h1>
    </header>

    <main class="product-grid">
        <div class="product-item" onclick="openDetails('Mercan Rafya İp Canvas Çanta', '450 TL', 'https://resmim.net/cdn/2026/07/15/C24QXq.png')">
            <div class="product-image-container"><img src="https://resmim.net/cdn/2026/07/15/C24QXq.png" alt="Çanta"></div>
            <h3>Mercan Rafya İp Canvas Çanta</h3>
            <p>450 TL</p>
        </div>

        <div class="product-item" onclick="openDetails('Lacivert Kağıt İp Çanta', '5900 TL', 'https://resmim.net/cdn/2026/07/15/C26Puq.png')">
            <div class="product-image-container"><img src="https://resmim.net/cdn/2026/07/15/C26Puq.png" alt="Çanta"></div>
            <h3>Lacivert Kağıt İp Çanta</h3>
            <p>5900 TL</p>
        </div>
    </main>

    <div id="details-overlay">
        <img id="d-img" src="" style="width:100px;">
        <h2 id="d-title"></h2>
        <p id="d-price"></p>
        <button class="close-btn" onclick="closeDetails()">Kapat</button>
    </div>

    <script>
        function openDetails(title, price, img) {
            document.getElementById('d-title').innerText = title;
            document.getElementById('d-price').innerText = price;
            document.getElementById('d-img').src = img;
            document.getElementById('details-overlay').style.display = 'block';
        }

        function closeDetails() {
            document.getElementById('details-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
