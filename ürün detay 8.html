<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <title>Ürün Detayı | Npurple</title>

        .product-info { flex: 1; min-width: 300px; }
        .stock-tag { background: #8E7AB5; color: white; padding: 5px 10px; border-radius: 4px; display: inline-block; margin-bottom: 15px; }
        .price { font-size: 1.8rem; font-weight: bold; margin: 20px 0; }
        .btn-whatsapp { 
            display: inline-block; padding: 15px 30px; background-color: #25D366; 
            color: white; text-decoration: none; border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="detail-container">
        <div class="product-image">
            <img src= "https://resmim.net/cdn/2026/07/15/CvQQ67.png"  alt="Çanta">
        </div>

            <h1>Polyester Makrome İp Cüzdan</h1>

               class="btn-whatsapp" target="_blank">

</body>
</html>
