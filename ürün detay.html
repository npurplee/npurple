<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürün Detayı | Npurple</title>
    <style>
        body { background-color: #FBE4D8; font-family: 'Sergio', serif; color: #2B124C; padding: 40px; }
        .detail-container { max-width: 900px; margin: 0 auto; display: flex; gap: 40px; flex-wrap: wrap; }
        .product-image { flex: 1; min-width: 300px; }
        .product-image img { width: 100%; border-radius: 10px; border: 2px solid #8E7AB5; }
        .product-info { flex: 1; min-width: 300px; }
        .stock-tag { background: #8E7AB5; color: white; padding: 5px 10px; border-radius: 4px; display: inline-block; margin-bottom: 15px; }
        .price { font-size: 1.8rem; font-weight: bold; margin: 20px 0; }
        .btn-whatsapp { 
            display: inline-block; padding: 15px 30px; background-color: #25D366; 
            color: white; text-decoration: none; border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="detail-container">
        <div class="product-image">
            <img src="https://resmim.net/cdn/2026/07/15/C2tp82.png"  alt="Çanta">
        </div>

        <div class="product-info">
            <h1>Nostaljik Kanaviçe Çanta</h1>
            <span class="stock-tag">Stokta Var (Son 2 adet)</span>
            <p style="line-height: 1.8;">
                Bu özel tasarım çanta, tamamen el emeği ile işlenmiştir. 
                Kumaşı, dokusu ve üzerindeki kanaviçe detayları annenizin atölyesinde 
                uzun saatler süren titiz bir çalışmanın ürünüdür.
            </p>
            <div class="price">450 TL</div>
            
            <a href="https://wa.me/905XXXXXXXXXX?text=Merhaba, Nostaljik Kanaviçe Çanta hakkında bilgi almak istiyorum." 
               class="btn-whatsapp" target="_blank">
               WhatsApp ile Sipariş Ver
            </a>
        </div>
    </div>

</body>
</html>
